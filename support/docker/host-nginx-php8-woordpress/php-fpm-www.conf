; PHP-FPM pool configuration for Alpine Linux
; This file is copied into the container to configure PHP-FPM

[www]
user = nginx
group = nginx

; Socket configuration
listen = /run/php/php-fpm.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

; Process manager settings
; Fórmula: pm.max_children = RAM disponível para PHP / ~35MB por worker
; Ex: 384MB / 35MB ≈ 10 workers → consumo máximo ~350MB
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500
pm.process_idle_timeout = 10s

; PHP settings
php_admin_value[error_log] = /var/log/php-fpm/www-error.log
php_admin_flag[log_errors] = on

; OPcache — bytecode cache: elimina re-compilação PHP a cada request
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 64
php_admin_value[opcache.interned_strings_buffer] = 8
php_admin_value[opcache.max_accelerated_files] = 4000
php_admin_value[opcache.revalidate_freq] = 60
php_admin_value[opcache.fast_shutdown] = 1
php_admin_value[opcache.save_comments] = 1

; Environment variables
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
