{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "evolution-api.fullname" . }}-redis
  labels:
    {{- include "evolution-api.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.redis.service.port }}
    targetPort: redis
    protocol: TCP
    name: redis
  selector:
    {{- include "evolution-api.redis.selectorLabels" . | nindent 4 }}
{{- end }}
