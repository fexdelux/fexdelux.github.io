{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evolution-api.fullname" . }}-postgresql
  labels:
    {{- include "evolution-api.postgresql.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "evolution-api.postgresql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "evolution-api.postgresql.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.postgresql.securityContext.enabled }}
      securityContext:
        fsGroup: {{ .Values.postgresql.securityContext.fsGroup }}
        {{- if .Values.postgresql.securityContext.fsGroupChangePolicy }}
        fsGroupChangePolicy: {{ .Values.postgresql.securityContext.fsGroupChangePolicy }}
        {{- end }}
      {{- end }}
      {{- if .Values.postgresql.initContainer.enabled }}
      initContainers:
      - name: init-chmod-data
        image: "{{ .Values.postgresql.initContainer.image }}"
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          chown -R {{ .Values.postgresql.securityContext.runAsUser | default 999 }}:{{ .Values.postgresql.securityContext.fsGroup }} /var/lib/postgresql/data || true
          chmod 700 /var/lib/postgresql/data || true
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        securityContext:
          runAsUser: 0
      {{- end }}
      containers:
      - name: postgresql
        image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
        imagePullPolicy: IfNotPresent
        {{- if .Values.postgresql.containerSecurityContext.enabled }}
        securityContext:
          runAsUser: {{ .Values.postgresql.containerSecurityContext.runAsUser }}
          runAsNonRoot: {{ .Values.postgresql.containerSecurityContext.runAsNonRoot }}
          allowPrivilegeEscalation: false
        {{- end }}
        ports:
        - name: postgresql
          containerPort: {{ .Values.postgresql.service.port }}
          protocol: TCP
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.auth.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "evolution-api.fullname" . }}-secret
              key: postgres-password
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.auth.database | quote }}
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          {{- toYaml .Values.postgresql.resources | nindent 12 }}
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U {{ .Values.postgresql.auth.username }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U {{ .Values.postgresql.auth.username }}
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: data
        {{- if .Values.postgresql.primary.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "evolution-api.fullname" . }}-postgresql
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
