{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evolution-api.fullname" . }}-redis
  labels:
    {{- include "evolution-api.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "evolution-api.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "evolution-api.redis.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: redis
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - name: redis
          containerPort: {{ .Values.redis.service.port }}
          protocol: TCP
        command:
        - redis-server
        {{- if .Values.redis.master.persistence.enabled }}
        - --appendonly
        - "yes"
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          {{- toYaml .Values.redis.resources | nindent 12 }}
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: data
        {{- if .Values.redis.master.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "evolution-api.fullname" . }}-redis
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
