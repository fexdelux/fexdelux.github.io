{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evolution-api.fullname" . }}-redis
  labels:
    {{- include "evolution-api.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "evolution-api.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "evolution-api.redis.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.redis.securityContext.enabled }}
      securityContext:
        fsGroup: {{ .Values.redis.securityContext.fsGroup }}
        {{- if .Values.redis.securityContext.fsGroupChangePolicy }}
        fsGroupChangePolicy: {{ .Values.redis.securityContext.fsGroupChangePolicy }}
        {{- end }}
      {{- end }}
      {{- if .Values.redis.initContainer.enabled }}
      initContainers:
      - name: init-chmod-data
        image: "{{ .Values.redis.initContainer.image }}"
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          set -e
          echo "Verificando diretório de dados..."
          mkdir -p /data
          echo "Ajustando permissões..."
          chown -R {{ .Values.redis.securityContext.runAsUser | default 999 }}:{{ .Values.redis.securityContext.fsGroup }} /data
          chmod 755 /data
          echo "Permissões ajustadas com sucesso!"
          ls -la /data
        volumeMounts:
        - name: data
          mountPath: /data
        securityContext:
          runAsUser: 0
      {{- end }}
      containers:
      - name: redis
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
        imagePullPolicy: IfNotPresent
        {{- if .Values.redis.containerSecurityContext.enabled }}
        securityContext:
          runAsUser: {{ .Values.redis.containerSecurityContext.runAsUser }}
          runAsNonRoot: {{ .Values.redis.containerSecurityContext.runAsNonRoot }}
          allowPrivilegeEscalation: false
        {{- end }}
        ports:
        - name: redis
          containerPort: {{ .Values.redis.service.port }}
          protocol: TCP
        command:
        - redis-server
        {{- if .Values.redis.master.persistence.enabled }}
        - --appendonly
        - "yes"
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          {{- toYaml .Values.redis.resources | nindent 12 }}
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: data
        {{- if .Values.redis.master.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "evolution-api.fullname" . }}-redis
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
