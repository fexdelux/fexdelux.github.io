{{- $apiKey := "" }}
{{- if .Values.evolution.authenticationApiKey }}
  {{- $apiKey = .Values.evolution.authenticationApiKey }}
{{- else }}
  {{- /* Tenta buscar o secret existente para manter a mesma API key em upgrades */}}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-secret" (include "evolution-api.fullname" .)) }}
  {{- if $existingSecret }}
    {{- /* Se o secret já existe, reutiliza a API key existente */}}
    {{- $apiKey = index $existingSecret.data "api-key" | b64dec }}
  {{- else }}
    {{- /* Se não existe, gera uma nova: UUID + 25 caracteres aleatórios */}}
    {{- $apiKey = printf "%s-%s" (uuidv4) (randAlphaNum 25 | upper) }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "evolution-api.fullname" . }}-secret
  labels:
    {{- include "evolution-api.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  api-key: {{ $apiKey | b64enc | quote }}
  {{- if or .Values.postgresql.enabled .Values.externalDatabase.enabled }}
  database-uri: {{ include "evolution-api.databaseUri" . | b64enc | quote }}
  {{- end }}
  {{- if or .Values.redis.enabled .Values.externalRedis.enabled }}
  redis-uri: {{ include "evolution-api.redisUri" . | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  postgres-password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.s3.enabled }}
  s3-access-key: {{ .Values.s3.accessKey | b64enc | quote }}
  s3-secret-key: {{ .Values.s3.secretKey | b64enc | quote }}
  {{- end }}
